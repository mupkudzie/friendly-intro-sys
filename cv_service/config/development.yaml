# Development configuration

flask:
  debug: true
  secret_key: "dev-secret-key"

camera:
  device_id: 0
  frame_width: 640
  frame_height: 480
  fps: 30

detection:
  confidence_threshold: 0.5
  nms_threshold: 0.4
  model_path: "models/yolov5s.pt"

pose:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

database:
  table_name: "worker_activities"